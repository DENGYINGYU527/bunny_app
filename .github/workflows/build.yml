name: Build Bunny App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Locate project directory
        id: locate
        shell: bash
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -d "bunny_app" ] && [ -f "bunny_app/pubspec.yaml" ]; then
            echo "dir=bunny_app" >> "$GITHUB_OUTPUT"
          elif [ -f "bunny_app.zip" ]; then
            unzip -q bunny_app.zip
            echo "dir=bunny_app" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi
          echo "Project dir: $(cat $GITHUB_OUTPUT | grep dir)"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: ${{ steps.locate.outputs.dir }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.locate.outputs.dir }}
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: bunny-android-apk
          path: ${{ steps.locate.outputs.dir }}/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Locate project directory
        id: locate
        shell: powershell
        run: |
          if (Test-Path "pubspec.yaml") {
            "dir=." | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } elseif ((Test-Path "bunny_app\pubspec.yaml")) {
            "dir=bunny_app" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } elseif (Test-Path "bunny_app.zip") {
            Expand-Archive -Path "bunny_app.zip" -DestinationPath "." -Force
            "dir=bunny_app" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "dir=." | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          Write-Output "Project dir: $env:GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        working-directory: ${{ steps.locate.outputs.dir }}
        run: flutter pub get

      - name: Build Windows
        working-directory: ${{ steps.locate.outputs.dir }}
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: bunny-windows
          path: ${{ steps.locate.outputs.dir }}/build/windows/x64/runner/Release/
